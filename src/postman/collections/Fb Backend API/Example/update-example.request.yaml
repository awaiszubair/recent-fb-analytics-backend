$kind: http-request
name: Update Example
method: PUT
url: '{{base_url}}/api/v1/example/:id'
order: 4000
pathVariables:
  - key: id
    value: '1'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Jane Doe",
      "email": "jane@example.com",
      "description": "Updated sample example record"
    }
