$kind: http-request
name: 'Update Example'
method: PUT
url: '{{baseUrl}}/api/v1/example/:id'
order: 4000
pathVariables:
  - key: id
    value: '{{exampleId}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Updated User",
      "email": "updated@example.com",
      "description": "Updated description"
    }
