$kind: http-request
name: Create Example
method: POST
url: '{{base_url}}/api/v1/example'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Jane Doe",
      "email": "jane@example.com",
      "description": "Sample example record"
    }
