$kind: http-request
name: 'Get Multiple Post Insights'
method: POST
url: '{{baseUrl}}/api/v1/insights/posts/batch'
order: 6000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "postIds": ["{{postId}}"],
      "metrics": ["post_impressions", "post_engaged_users"],
      "access_token": "{{access_token}}"
    }
