services:
  db:
    image: postgres:15-alpine
    container_name: fb_analytics_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fb_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fb_analytics_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
